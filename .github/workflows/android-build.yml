name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests and coverage verification
        run: ./gradlew testDebugUnitTest jacocoProtocolCoverageVerification jacocoProtocolCoverageReport

      - name: Upload unit test report
        uses: actions/upload-artifact@v7
        with:
          name: pulse-fit-engine-unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: pulse-fit-engine-protocol-coverage
          path: app/build/reports/jacoco/jacocoProtocolCoverageReport/

  build:
    runs-on: ubuntu-latest
    needs:
      - unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: pulse-fit-engine-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
